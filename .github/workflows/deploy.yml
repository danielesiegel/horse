name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-deploy:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache forester binary
        uses: actions/cache@v4
        with:
          path: ~/.forester
          key: forester-4.3.1-linux-x86_64

      - name: Build forester site
        run: |
          chmod +x ./forester
          ./forester build bci-forest.toml
          cp index.html output/index.html

      - name: Deploy to Cloudflare Pages
        if: github.ref == 'refs/heads/main'
        run: npx wrangler pages deploy output --project-name=bci-horse --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
