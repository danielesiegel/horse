name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: bci-horse
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build bci.horse forest
        run: nix build .#forest --print-build-logs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: forest-output
          path: result/
          retention-days: 1

  build-localcharts:
    runs-on: ubuntu-24.04
    # localcharts/forest has pre-existing build issues (missing macros, unresolved \definition)
    # TODO: remove continue-on-error once localcharts/forest is fixed upstream
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        subenvironment:
          - localcharts/forest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v30
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - uses: cachix/cachix-action@v15
        continue-on-error: true
        with:
          name: bci-horse
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Build ${{ matrix.subenvironment }}
        working-directory: ${{ matrix.subenvironment }}
        run: nix build --print-build-logs

  deploy:
    needs: [build]
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-24.04
    environment: production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: forest-output
          path: output/

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./output --project-name=bci-horse --commit-dirty=true
